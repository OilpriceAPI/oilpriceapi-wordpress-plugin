name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-syntax:
    name: PHP ${{ matrix.php }} syntax check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 7.4 is the plugin's minimum ("Requires PHP: 7.4" in readme.txt)
        php: ["7.4", "8.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: php -l all plugin files
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            php -l "$f"
            found=1
          done < <(find . -name '*.php' -not -path './.git/*' -print0)
          [ "$found" -eq 1 ] || { echo "No PHP files found"; exit 1; }
